name: Cypress Tests - CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]
  schedule:
    # Executar testes diariamente às 8h UTC
    - cron: '0 8 * * *'

jobs:
  test:
    name: Run Cypress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📚 Instalar dependências
        run: npm ci

      - name: 🧪 Executar testes E2E/API
        run: npm run test:all
        env:
          CI: true
          BASE_URL: https://front.serverest.dev
          API_URL: https://serverest.dev/api

      - name: 📸 Upload de screenshots (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.node-version }}
          path: cypress/screenshots/
          retention-days: 30

      - name: 🎥 Upload de vídeos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.node-version }}
          path: cypress/videos/
          retention-days: 7

      - name: 📊 Gerar relatório de testes
        if: always()
        run: |
          echo "## 🧪 Resultados dos Testes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Node Version**: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Data**: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Validação de sucesso
        if: success()
        run: echo "✅ Todos os testes passaram com sucesso!"

      - name: ❌ Notificação de falha
        if: failure()
        run: |
          echo "❌ Alguns testes falharam"
          echo "Verifique os artefatos: screenshots e vídeos"
          exit 1

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📚 Instalar dependências
        run: npm ci

      - name: 🔍 Verificar arquivos de teste
        run: |
          echo "Verificando estrutura dos testes..."
          
          # Verificar testes E2E
          if [ -f "cypress/e2e/api/auth.cy.js" ] && [ -f "cypress/e2e/api/products.cy.js" ]; then
            echo "✅ Testes de API encontrados"
          else
            echo "❌ Testes de API faltando"
            exit 1
          fi
          
          # Verificar testes UI
          if [ -f "cypress/e2e/ui/auth-flow.cy.js" ] && [ -f "cypress/e2e/ui/products.cy.js" ]; then
            echo "✅ Testes E2E encontrados"
          else
            echo "❌ Testes E2E faltando"
            exit 1
          fi
          
          # Verificar documentação
          if [ -f "README.md" ]; then
            echo "✅ Documentação encontrada"
          else
            echo "❌ README.md faltando"
            exit 1
          fi

      - name: 🔐 Verificar segurança (sem credenciais)
        run: |
          echo "Verificando segurança..."
          
          # Não deve ter credenciais no código
          if grep -r "password.*=.*[a-zA-Z0-9]" cypress/e2e --include="*.js" | grep -v "faker\|fixture\|example\|Test" | grep -v "@faker-js"; then
            echo "⚠️ Possível credencial hardcoded detectada"
            exit 1
          fi
          
          # Validar .env.example não tem valores reais
          if grep -E "password|token|key" .env.example | grep -E "=\s*[a-zA-Z0-9]{8,}"; then
            echo "⚠️ Valores sensíveis em .env.example"
            exit 1
          fi
          
          echo "✅ Validação de segurança ok"

summary-report:
  name: Summary Report
  runs-on: ubuntu-latest
  needs: [test, lint]
  if: always()

  steps:
    - name: 📋 Relatório Final
      run: |
        echo "# 🧪 Teste QA - Relatório de Execução" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Status de Execução" >> $GITHUB_STEP_SUMMARY
        echo "- **Testes**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Validação de Código**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📈 Cobertura" >> $GITHUB_STEP_SUMMARY
        echo "- API Tests: 6 cenários (2+ positivos, 1+ negativos)" >> $GITHUB_STEP_SUMMARY
        echo "- E2E Tests: 6 cenários (2+ positivos, 1+ negativos)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Data de Execução**: $(date)" >> $GITHUB_STEP_SUMMARY
